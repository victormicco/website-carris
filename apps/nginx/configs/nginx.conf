# Massive thank you to @ricardojorgerm and @tiagogaspar8
# for the help in creating this nginx configuration file.


# # #
# USER

user nginx;


# # #
# WORKER PROCESSES

worker_processes auto;



# # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;


# # #
# EVENTS

events {
	use epoll;
	worker_connections 2048;
}


# # #
# HTTP

http {

	# #
	# MIME TYPES

	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	# #
	# LOGS

	log_format main '$time_iso8601 | $status [$upstream_cache_status] | IP $remote_addr | Request: "$request" | Referrer: "$http_referrer" | User Agent: "$http_user_agent"';

	access_log /var/log/nginx/access.log main buffer=32k flush=3s;


	# #
	# FILE DESCRIPTOR SETTINGS

	aio on;
	directio 512;
	sendfile on;
	tcp_nopush on;

	keepalive_timeout 65;


	# # #
	# CLOUDFLARE TRUSTED IPS

	include cloudflare.conf;


	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=30;

	limit_req_zone $remote_addr zone=ip:10m rate=100r/s;
	limit_req zone=ip burst=50 delay=30;

	limit_req_status 429;


	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;



	# # # # # # # # # # # # # # # # # # # # # #
	# # # FRONTEND


	# # #
	# CACHE

	proxy_cache_path /var/cache/nginx/backoffice_api_cache levels=1:2 keys_zone=backoffice_api_cache:512m inactive=360m;

	proxy_cache_path /var/cache/nginx/frontend_cache levels=1:2 keys_zone=frontend_cache:512m inactive=360m;


	map $http_rsc $normalized_rsc_header {
		# Apply a normalization to the RSC header used to identify
		# react-server-components payloads in the proxy_cache_key.
		# This map function is used to prevent amplification by junk values.
		# It checks if the RSC header is equal to 1. If it is, then it sets
		# the $normalized_rsc_header variable to "_rsc". If it is not, then
		# it sets the variable to an empty string.
		"1" "_rsc";
		default "";
	}

	map $upstream_http_expires $intermediate_expires_value {
		# This map block is checking if the upstream has sent
		# an Expires header. If it has, then the
		# $intermediate_expires_value variable is set to that value.
		# If it hasn't, then an empty string is returned.
		"~." $upstream_http_expires;
		default "";
	}

	map $skip_cache $final_expires_header {
		# This map block then checks if the $skip_cache variable
		# is set to 1. If it is, then the $final_expires_header
		# variable is overridden to "epoch", which means no-cache.
		# If skip cache is 0 then the $final_expires_header is set
		# to the value of $intermediate_expires_value, which is either empty
		# or the value of the Expires header from the upstream.
		0 $intermediate_expires_value;
		1 "epoch";
	}


	# # #
	# UPSTREAM

	upstream backoffice_upstream {
		zone upstreams 64K;
		server backoffice:3000 max_fails=1 fail_timeout=2s;
		keepalive 10;
	}

	upstream frontend_upstream {
		zone upstreams 64K;
		server frontend:3000 max_fails=1 fail_timeout=2s;
		keepalive 10;
	}


	# # #
	# DEFAULT HTTP SERVER
	# Redirect to HTTPS

	server {

		listen 80;
		listen [::]:80;
		server_name ${PRIMARY_DOMAIN};
		server_tokens off;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		if ($host != '${PRIMARY_DOMAIN}') {
			return 302 http://${PRIMARY_DOMAIN}$request_uri;
		}

		location / {
			return 301 https://$host$request_uri;
		}

	}


	# # #
	# HTTPS SERVER

	server {

		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		server_name ${PRIMARY_DOMAIN};
		server_tokens off;
		http2 on;

		# Lets Encrypt Certificates
		ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;
		include /etc/letsencrypt/options-ssl-nginx.conf;
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
		ssl_early_data on;

		# Enforce host
		if ($host != '${PRIMARY_DOMAIN}') {
			return 302 https://${PRIMARY_DOMAIN}$request_uri;
		}

		# Do not skip cache by default
		set $skip_cache 0;
		set $skip_reason "";

		# Skip cache if Uptime Monitor
		include uptime.conf;

		# Cache configuration
		etag on;
		proxy_cache_key "$scheme$request_method$host$uri|$normalized_rsc_header";
		proxy_cache_lock on;
		proxy_cache_lock_age 30s;
		proxy_cache_lock_timeout 90s;
		proxy_cache_use_stale error timeout updating;
		proxy_cache_revalidate on;
		proxy_cache_background_update on;
		proxy_cache_bypass $skip_cache;

		# Proxy configuration
		proxy_http_version 1.1;
		proxy_connect_timeout 10s;
		proxy_send_timeout 20s;
		proxy_read_timeout 20s;
		proxy_set_header Connection "";
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $host;
		proxy_next_upstream error timeout http_500;

		# Remove headers from proxy
		# proxy_hide_header 'Cache-Control';

		location ^~ /admin {
			# Add headers
			add_header CMET-Cache-Skip $skip_reason;
			add_header CMET-Cache-Status $upstream_cache_status;
			add_header Strict-Transport-Security "max-age=31536000" always;
			# Proxy connect
			proxy_pass http://backoffice_upstream;
		}

		location ^~ /admin/api/public {
			# Remove headers from proxy
			# proxy_hide_header 'Cache-Control';
			# Setup cache
			# proxy_cache backoffice_api_cache;
			# proxy_cache_valid 200 1m;
			# proxy_cache_valid 404 5m;
			# Add headers
			add_header CMET-Cache-Skip $skip_reason;
			add_header CMET-Cache-Status $upstream_cache_status;
			add_header Strict-Transport-Security "max-age=31536000" always;
			# Proxy connect
			proxy_pass http://backoffice_upstream;
		}

		# location ~* \.(gif|jpeg|jpg|png|svg|pdf)$ {
		# 	# Remove headers from proxy
		# 	# proxy_hide_header 'Cache-Control';
		# 	# Add headers
		# 	add_header CMET-Cache-Skip $skip_reason;
		# 	add_header CMET-Cache-Status $upstream_cache_status;
		# 	add_header Strict-Transport-Security "max-age=31536000" always;
		# 	# Proxy connect
		# 	proxy_pass http://frontend_upstream;
		# }

		location / {
			# Remove headers from proxy
			# proxy_hide_header 'Cache-Control';
			# Add headers
			add_header CMET-Cache-Skip $skip_reason;
			add_header CMET-Cache-Status $upstream_cache_status;
			add_header Strict-Transport-Security "max-age=31536000" always;
			# Proxy connect
			proxy_pass http://frontend_upstream;
		}

	}

}